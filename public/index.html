<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ingressos</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg"></div>
    <header class="top">
      <div class="container top__inner">
        <div class="brand">
          <div class="brand__logo" aria-hidden="true">🎟️</div>
          <div class="brand__text">
            <div class="brand__title">Rabbit Tickets</div>
            <div class="brand__subtitle">Escolha um artista e compre seu ingresso</div>
          </div>
        </div>
        <div class="user">
          <label class="field">
            <span class="field__label">Seu nome</span>
            <input id="userName" class="field__input" type="text" placeholder="Ex: Pedrinho" autocomplete="name" />
          </label>
        </div>
      </div>
    </header>

    <main class="container">
      <section class="panel">
        <div class="panel__head">
          <h1 class="panel__title">Artistas</h1>
          <button id="refresh" class="btn btn--ghost" type="button">Atualizar</button>
        </div>

        <div id="status" class="status" role="status" aria-live="polite"></div>

        <div id="grid" class="grid" aria-busy="true"></div>
      </section>
    </main>

    <footer class="container footer">
      <span class="muted">Dica: abra o <code>consumer.js</code> no terminal para ver o processamento.</span>
    </footer>

    <script src="/app.js" defer></script>
  </body>
</html>
